spring:
  application:
    name: account_service

  kafka:
    bootstrap-servers: "localhost:29092,localhost:29093,localhost:29094"  # Kafka broker(s)
    producer:
      # key-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      # 0: no wait for kafka response
      # 1: leader write access, not wait for follower
      # -1: wait for all leader, and replication
      acks: -1
      retries: 1
      properties:
        enable.idempotence: true  # prevent duplicate sent
        max.in.flight.requests.per.connection: 5 # max requests in 1 connection
    consumer:
      # group-id: my-group                      # Consumer group ID
      auto-offset-reset: earliest
      # key-deserializer: "org.springframework.kafka.support.serializer.JsonDeserializer"
      value-deserializer: "org.springframework.kafka.support.serializer.JsonDeserializer"  # JsonDeserializer, StringDeserializer
      # enable-auto-commit: false               # (optional) manual ack